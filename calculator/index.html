<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Calculator UI</title>
    <style>
        body {
            background: #8ae0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial;
        }

        .calculator {
            background: black;
            padding: 25px;
            border-radius: 20px;
            width: 260px;
        }

        input {
            background: #e8e8e8;
            height: 45px;
            width: 100%;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: xx-large;
        }

        .keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 45px;
            background: #d6d6d6;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            /* cursor: pointer; */
        

        }
        button:hover {
            transform: scale(1.2);
            transition: 0.5s;
        }

        .clear {
            background: #ff3d2e;
            color: white;
        }

        .equal {
            background: #ff5800;
            height: 55px;
            margin-top: 20px;
            width: 100%;
            border: none;
            border-radius: 8px;
            font-size: 22px;
            color: white;
            cursor: pointer;
        }
    </style>


</head>

<body>

    <div class="calculator">

        
            <input readonly id="calc" type="text">
       

        <div class="keys">
            <button onclick="btnclick (7)" class="number">7</button>
            <button onclick="btnclick (8)" class="number">8</button>
            <button onclick="btnclick (9)" class="number">9</button>
            <button onclick="btnclick ('/')" class="operator">/</button>

            <button onclick="btnclick (4)">4</button>
            <button onclick="btnclick (5)">5</button>
            <button onclick="btnclick (6)">6</button>
            <button onclick="btnclick ('*')">*</button>

            <button onclick="btnclick (1)">1</button>
            <button onclick="btnclick (2)">2</button>
            <button onclick="btnclick (3)">3</button>
            <button onclick="btnclick ('-')">-</button>

            <button onclick="btnclick ('.')">.</button>
            <button onclick="btnclick (0)">0</button>
            <button onclick="btnclick ('+')">+</button>

            <button onclick="deleteLast()" class="clear">C</button>
            <button onclick="clerall()" class="clearall">CE</button>
        </div>

        <button  onclick="equalsto()" class="equal">=</button>

    </div>

</body>
<script src="app.js"></script>

</html>
