<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Calculator UI</title>
    <style>


</head>

<body>

    <div class="calculator">

        
            <input readonly id="calc" type="text">
       

        <div class="keys">
            <button onclick="btnclick (7)" class="number">7</button>
            <button onclick="btnclick (8)" class="number">8</button>
            <button onclick="btnclick (9)" class="number">9</button>
            <button onclick="btnclick ('/')" class="operator">/</button>

            <button onclick="btnclick (4)">4</button>
            <button onclick="btnclick (5)">5</button>
            <button onclick="btnclick (6)">6</button>
            <button onclick="btnclick ('*')">*</button>

            <button onclick="btnclick (1)">1</button>
            <button onclick="btnclick (2)">2</button>
            <button onclick="btnclick (3)">3</button>
            <button onclick="btnclick ('-')">-</button>

            <button onclick="btnclick ('.')">.</button>
            <button onclick="btnclick (0)">0</button>
            <button onclick="btnclick ('+')">+</button>

            <button onclick="deleteLast()" class="clear">C</button>
            <button onclick="clerall()" class="clearall">CE</button>
        </div>

        <button  onclick="equalsto()" class="equal">=</button>

    </div>

</body>
<script src="app.js"></script>

</html>
