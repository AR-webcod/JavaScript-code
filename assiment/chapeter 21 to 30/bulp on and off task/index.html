<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulb ON OFF</title>
    <link rel="stylesheet" href="style.css">


</head>

<body>

    <div class="container">

        <h1> Bulb ON OFF Task</h1>

        <div class="bulb-box">

            <!-- OFF Bulb -->
            <img id="bulb" class="bulb" src="./imges/pic_bulboff.gif" alt="Bulb">



        </div>

        <div class="buttons">

            <button class="on-btn" onclick="turnOn()">
                Turn ON
            </button>

            <button class="off-btn" onclick="turnOff()">
                Turn OFF
            </button>

        </div>

    </div>

   
 <script src="app.js"></script>
</body>

</html>
