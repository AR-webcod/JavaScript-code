<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid ul Adha Counter</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="moon"></div>

    <div class="cow-image">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <!-- Cow Body -->
            <ellipse cx="100" cy="120" rx="70" ry="50" fill="#8B6914"/>
            <!-- Cow Head -->
            <circle cx="100" cy="50" r="35" fill="#A67C52"/>
            <!-- Ears -->
            <ellipse cx="75" cy="25" rx="12" ry="20" fill="#8B6914"/>
            <ellipse cx="125" cy="25" rx="12" ry="20" fill="#8B6914"/>
            <!-- Horns -->
            <line x1="70" y1="20" x2="50" y2="0" stroke="#333" stroke-width="4" stroke-linecap="round"/>
            <line x1="130" y1="20" x2="150" y2="0" stroke="#333" stroke-width="4" stroke-linecap="round"/>
            <!-- Eyes -->
            <circle cx="88" cy="40" r="5" fill="#000"/>
            <circle cx="112" cy="40" r="5" fill="#000"/>
            <!-- Nose -->
            <ellipse cx="100" cy="55" rx="8" ry="6" fill="#654321"/>
            <!-- Front Legs -->
            <rect x="80" y="160" width="10" height="35" fill="#654321" rx="5"/>
            <rect x="110" y="160" width="10" height="35" fill="#654321" rx="5"/>
            <!-- Back Legs -->
            <rect x="65" y="160" width="10" height="35" fill="#654321" rx="5"/>
            <rect x="125" y="160" width="10" height="35" fill="#654321" rx="5"/>
            <!-- Tail -->
            <path d="M 165 110 Q 180 100 175 80" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
            <!-- Udder -->
            <ellipse cx="100" cy="155" rx="15" ry="10" fill="#D4A574"/>
        </svg>
    </div>

    <div class="man-image">
        <svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
            <!-- Head -->
            <circle cx="100" cy="40" r="25" fill="#D4A574"/>
            <!-- Hair -->
            <path d="M 75 40 Q 75 15 100 15 Q 125 15 125 40" fill="#8B4513"/>
            <!-- Eyes -->
            <circle cx="92" cy="35" r="3" fill="#000"/>
            <circle cx="108" cy="35" r="3" fill="#000"/>
            <!-- Nose -->
            <line x1="100" y1="35" x2="100" y2="45" stroke="#8B6914" stroke-width="2"/>
            <!-- Mouth -->
            <path d="M 92 50 Q 100 55 108 50" stroke="#654321" stroke-width="1.5" fill="none"/>
            <!-- Body/Shirt -->
            <rect x="80" y="70" width="40" height="50" fill="#8B4513" rx="5"/>
            <!-- Arms -->
            <rect x="50" y="80" width="30" height="12" fill="#D4A574" rx="6"/>
            <rect x="120" y="80" width="30" height="12" fill="#D4A574" rx="6"/>
            <!-- Hands -->
            <circle cx="45" cy="86" r="8" fill="#D4A574"/>
            <circle cx="155" cy="86" r="8" fill="#D4A574"/>
            <!-- Pants -->
            <rect x="85" y="120" width="15" height="50" fill="#333" rx="3"/>
            <rect x="100" y="120" width="15" height="50" fill="#333" rx="3"/>
            <!-- Shoes -->
            <ellipse cx="92.5" cy="170" rx="8" ry="6" fill="#000"/>
            <ellipse cx="107.5" cy="170" rx="8" ry="6" fill="#000"/>
            <!-- Hat -->
            <rect x="80" y="5" width="40" height="15" fill="#2F4F4F" rx="3"/>
            <path d="M 80 5 L 70 0 L 130 0 L 120 5" fill="#2F4F4F"/>
        </svg>
    </div>

    <div class="container">
    

        <div class="counter">

            <div class="box">
                <h2 id="days">0</h2>
                <p>Days</p>
            </div>

            <div class="box">
                <h2 id="hours">0</h2>
                <p>Hours</p>
            </div>

            <div class="box">
                <h2 id="minutes">0</h2>
                <p>Minutes</p>
            </div>

            <div class="box">
                <h2 id="seconds">0</h2>
                <p>Seconds</p>
            </div>

        </div>

        <canvas id="fireworks"></canvas>

    </div>

    <script src="app.js"></script>

</body>

</html>
