<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eid ul Adha Counter</title>
  <link rel="stylesheet" href="style.css">


</head>

<body>

  <div class="container">

    <h1>🐐 Eid ul Adha Countdown</h1>

    <div class="counter">

      <div class="box">
        <h2 id="days">0</h2>
        <p>Days</p>
      </div>

      <div class="box">
        <h2 id="hours">0</h2>
        <p>Hours</p>
      </div>

      <div class="box">
        <h2 id="minutes">0</h2>
        <p>Minutes</p>
      </div>

      <div class="box">
        <h2 id="seconds">0</h2>
        <p>Seconds</p>
      </div>

    </div>

  </div>





</body>
<script src="app.js"></script>

</html>
